<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Адмін-панель | Road.Scan</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0088ff;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --danger: #ff004c;
            --success: #2ecc71;
            --warning: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Exo 2', sans-serif; background: var(--bg); color: white; line-height: 1.6; overflow-x: hidden; }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        #login-screen { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
        .login-box { 
            background: var(--card-bg); backdrop-filter: blur(10px); padding: 40px; 
            border-radius: 24px; border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 100%; max-width: 400px;
        }
        .btn-google { 
            background: white; color: black; border: none; padding: 14px 25px; border-radius: 12px; 
            cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 12px; margin: 20px auto 0;
            transition: 0.3s;
        }
        .btn-google:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

        #admin-content { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-panel { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 15px; background: var(--card-bg); border-radius: 15px; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--accent); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }

        .table-wrapper { background: var(--card-bg); border-radius: 20px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }
        table { width: 100%; border-collapse: collapse; text-align: left; min-width: 1200px; }
        th { background: rgba(255,255,255,0.03); padding: 20px; color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05); vertical-align: middle; }

        .img-preview { 
            width: 80px; 
            height: 80px; 
            object-fit: cover; 
            border-radius: 10px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .img-preview:hover { 
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .before-after-container {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .after-photo-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
        }
        .upload-btn {
            background: var(--warning);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: 0.2s;
        }
        .upload-btn:hover { opacity: 0.8; }
        .delete-after-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.6rem;
        }
        .after-badge {
            background: var(--success);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .btn-map { background: var(--success); color: white; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Exo 2'; transition: 0.2s; }
        .btn-delete:hover { opacity: 0.8; }

        .date-badge { font-size: 0.85rem; color: #94a3b8; display: block; }
        .votes-count { font-weight: 700; color: var(--accent); font-size: 1.1rem; }
        
        .contact-phone { color: #2ecc71; font-weight: 600; }
        .contact-comment { color: #94a3b8; max-width: 200px; word-break: break-word; }

        .image-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-modal:hover {
            color: #ff3232;
            transform: scale(1.2);
        }

        .compare-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .compare-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .compare-box {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
        }
        .compare-box h3 {
            margin-bottom: 15px;
            color: var(--accent);
        }
        .compare-box img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .close-compare {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 850px) {
            .table-wrapper { overflow-x: scroll; }
            .compare-container { flex-direction: column; }
            .compare-box img { max-height: 300px; }
            .close-modal, .close-compare { top: 10px; right: 20px; font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <div class="login-box">
                <h2 style="font-family: 'Orbitron'; color: var(--accent);">ROAD.ADMIN</h2>
                <p style="color: #64748b; margin-top: 10px;">Тільки для модераторів Дніпра</p>
                <button class="btn-google" onclick="login()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
                    Увійти через Google
                </button>
                <p id="error-msg" style="color: var(--danger); margin-top: 20px; display: none; font-size: 0.9rem;"></p>
            </div>
        </div>

        <div id="admin-content">
            <div class="header-panel">
                <h1>Моніторинг</h1>
                <div>
                    <span id="user-email" style="font-size: 0.8rem; margin-right: 15px; color: #94a3b8;"></span>
                    <button onclick="logout()" style="background:none; border:1px solid #475569; color:#94a3b8; padding:5px 12px; border-radius:8px; cursor:pointer;">Вийти</button>
                </div>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Фото (До)</th>
                            <th>Дата подачі</th>
                            <th>Локація</th>
                            <th>Контакт</th>
                            <th>Коментар</th>
                            <th>Голоси</th>
                            <th>Фото (Після)</th>
                            <th>Керування</th>
                        </tr>
                    </thead>
                    <tbody id="pitList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="imageModal" class="image-modal" onclick="closeImageModal()">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <img id="modalImage" src="" alt="Збільшене фото">
    </div>

    <div id="compareModal" class="compare-modal">
        <span class="close-compare" onclick="closeCompareModal()">&times;</span>
        <div class="compare-container">
            <div class="compare-box">
                <h3>📸 ДО РЕМОНТУ</h3>
                <img id="beforeImage" src="" alt="До ремонту">
            </div>
            <div class="compare-box">
                <h3>✅ ПІСЛЯ РЕМОНТУ</h3>
                <img id="afterImage" src="" alt="Після ремонту">
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6eAjnQsDrho7wAoKXgjSXVjHi_bjFiog",
            authDomain: "pits-de6be.firebaseapp.com",
            projectId: "pits-de6be",
            storageBucket: "pits-de6be.firebasestorage.app",
            messagingSenderId: "640813563870",
            appId: "1:640813563870:web:c789ef99a9359491e2274f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const allowedEmails = ["andrey2003kornev@gmail.com"];

        // Функція оптимізації фото (зменшення розміру)
        const processImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX = 800;
                        if (width > MAX) { height *= MAX / width; width = MAX; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        window.openFullImage = (imageUrl) => {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.style.display = 'flex';
            modalImg.src = imageUrl;
        };

        window.closeImageModal = () => {
            document.getElementById('imageModal').style.display = 'none';
        };

        window.openCompareModal = (beforeUrl, afterUrl) => {
            const modal = document.getElementById('compareModal');
            const beforeImg = document.getElementById('beforeImage');
            const afterImg = document.getElementById('afterImage');
            beforeImg.src = beforeUrl;
            afterImg.src = afterUrl;
            modal.style.display = 'flex';
        };

        window.closeCompareModal = () => {
            document.getElementById('compareModal').style.display = 'none';
        };

        // Завантаження фото "після" як base64 в Firestore
        window.uploadAfterPhoto = async (pitId, fileInput) => {
            const file = fileInput.files[0];
            if (!file) return;

            if (!confirm('Завантажити фото виконаних робіт?')) return;

            const btn = document.getElementById(`uploadBtn_${pitId}`);
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loading-spinner"></span> Завантаження...';
            btn.disabled = true;

            try {
                showToast("Оптимізація фото...");
                const base64Image = await processImage(file);
                
                showToast("Збереження в базу...");
                const pitRef = doc(db, "potholes", pitId);
                await updateDoc(pitRef, {
                    afterPhoto: base64Image,
                    repaired: true
                });
                
                showToast("Фото успішно завантажено!");
                fileInput.value = '';
            } catch (error) {
                console.error('Помилка завантаження:', error);
                showToast("Помилка завантаження фото");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        };

        // Видалення фото "після"
        window.deleteAfterPhoto = async (pitId) => {
            if (!confirm('Видалити фото виконаних робіт?')) return;
            
            try {
                const pitRef = doc(db, "potholes", pitId);
                await updateDoc(pitRef, {
                    afterPhoto: null,
                    repaired: false
                });
                showToast("Фото видалено");
            } catch (error) {
                console.error('Помилка видалення:', error);
                showToast("Помилка видалення фото");
            }
        };

        window.showToast = (msg) => {
            const container = document.getElementById('notification-container');
            if (!container) {
                const div = document.createElement('div');
                div.id = 'notification-container';
                div.style.position = 'fixed';
                div.style.bottom = '20px';
                div.style.left = '50%';
                div.style.transform = 'translateX(-50%)';
                div.style.zIndex = '9999';
                document.body.appendChild(div);
            }
            const toastContainer = document.getElementById('notification-container') || document.body;
            const t = document.createElement('div'); 
            t.className = 'toast'; 
            t.innerText = msg;
            t.style.background = 'white';
            t.style.padding = '10px 20px';
            t.style.borderRadius = '10px';
            t.style.marginTop = '5px';
            t.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
            toastContainer.appendChild(t); 
            setTimeout(() => t.remove(), 3000);
        };

        window.login = () => signInWithPopup(auth, provider).catch(err => console.error(err));
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && allowedEmails.includes(user.email)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
                loadPits();
            } else if (user) {
                document.getElementById('error-msg').innerText = "Ваш email відсутній у списку модераторів.";
                document.getElementById('error-msg').style.display = 'block';
                signOut(auth);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        function loadPits() {
            onSnapshot(collection(db, "potholes"), (snap) => {
                const list = document.getElementById('pitList');
                list.innerHTML = '';
                let items = [];
                snap.forEach(s => items.push({id: s.id, ...s.data()}));
                
                items.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

                items.forEach(d => {
                    const timestamp = d.createdAt?.toDate ? d.createdAt.toDate() : null;
                    const dateDisplay = timestamp 
                        ? timestamp.toLocaleDateString('uk-UA') + ' ' + timestamp.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'})
                        : "Початок проекту";
                    
                    const mapUrl = `https://www.google.com/maps?q=${d.lat},${d.lng}`;
                    const contactPhone = d.contactPhone ? d.contactPhone : '—';
                    const contactComment = d.contactComment ? d.contactComment : '—';
                    
                    const hasAfterPhoto = d.afterPhoto && d.afterPhoto !== '';
                    
                    list.innerHTML += `
                        <tr>
                            <td data-label="Фото До">
                                <img src="${d.photo}" class="img-preview" onclick="openFullImage('${d.photo}')">
                            </td>
                            <td data-label="Додано"><span class="date-badge">${dateDisplay}</span></td>
                            <td data-label="Мапа"><a href="${mapUrl}" target="_blank" class="btn-map">📍 Google Maps</a></td>
                            <td data-label="Контакт"><span class="contact-phone">${contactPhone}</span></td>
                            <td data-label="Коментар"><span class="contact-comment">${contactComment}</span></td>
                            <td data-label="Голоси"><span class="votes-count">${d.votes}</span></td>
                            <td data-label="Фото Після">
                                <div class="before-after-container">
                                    ${hasAfterPhoto ? 
                                        `<img src="${d.afterPhoto}" class="after-photo-preview" onclick="openFullImage('${d.afterPhoto}')">
                                         <button class="delete-after-btn" onclick="deleteAfterPhoto('${d.id}')">🗑️</button>
                                         <span class="after-badge">✅ Виконано</span>` 
                                        : 
                                        `<div>
                                            <input type="file" id="afterFile_${d.id}" accept="image/*" style="display:none" onchange="uploadAfterPhoto('${d.id}', this)">
                                            <button class="upload-btn" id="uploadBtn_${d.id}" onclick="document.getElementById('afterFile_${d.id}').click()">📤 Завантажити фото</button>
                                         </div>`
                                    }
                                </div>
                            </td>
                            <td data-label="Дія">
                                <button class="btn-delete" onclick="deletePit('${d.id}')">Видалити</button>
                            </td>
                        </tr>`;
                });
            });
        }

        window.deletePit = async (id) => {
            if(confirm('Видалити мітку з карти Дніпра?')) {
                try { 
                    await deleteDoc(doc(db, "potholes", id)); 
                } catch(e) { 
                    alert("Помилка видалення. Перевірте консоль."); 
                }
            }
        };
    </script>
</body>
</html>
