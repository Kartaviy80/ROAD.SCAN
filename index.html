<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadCare UA | Моніторинг Дніпра</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f7f9;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --accent-crit: #ff004c;
            --accent-green: #2ecc71;
            --accent-success: #27ae60;
            --text-main: #2c3e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Exo 2', sans-serif; background-color: var(--bg-color); overflow: hidden; }

        header {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; width: 90%; max-width: 1100px;
            background: var(--glass-bg); backdrop-filter: blur(15px);
            padding: 15px 25px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid rgba(255,255,255,0.5);
        }

        .logo { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: #ff3232; font-weight: 700; letter-spacing: 2px; }

        #map { height: 100vh; width: 100%; background: #e5e5e5; }

        #notification-container {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            z-index: 2000; display: flex; flex-direction: column; gap: 10px; pointer-events: none;
        }

        .toast {
            background: white; border-left: 4px solid #ff3232;
            padding: 12px 25px; border-radius: 12px; font-size: 0.9rem;
            animation: slideUp 0.4s ease-out forwards; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 20px;
            width: 90%;
            max-width: 350px;
            text-align: center;
            color: #2c3e50;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-family: inherit;
        }
        .modal-content button {
            background: #ff3232;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            margin-top: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Модальне вікно порівняння */
        .compare-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .compare-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .compare-box {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            max-width: 400px;
        }
        .compare-box h3 {
            margin-bottom: 15px;
            color: #0088ff;
        }
        .compare-box img {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .close-compare {
            position: absolute;
            top: 20px;
            right: 40px;
            color: white;
            font-size: 50px;
            cursor: pointer;
            font-family: Arial;
        }
        .close-compare:hover { color: #ff3232; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .controls { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .btn-main {
            background: #ff3232; border: none; color: white;
            padding: 18px 30px; border-radius: 50px; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem; transition: 0.3s;
            box-shadow: 0 8px 25px rgba(255, 50, 50, 0.3); text-transform: uppercase;
        }

        .pit-card { text-align: center; min-width: 220px; padding: 5px; }
        .pit-card img { width: 100%; border-radius: 10px; margin-top: 10px; max-height: 150px; object-fit: cover; background: #eee; }
        
        .vote-btn {
            width: 100%; background: white; border: 1px solid #ff3232;
            color: #ff3232; padding: 10px; margin-top: 8px;
            border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .vote-btn.photo-success {
            background: var(--accent-green) !important;
            color: white !important;
            border-color: var(--accent-green) !important;
        }

        .adding-mode { cursor: crosshair !important; }
        
        /* Стиль для зеленого маркера (відремонтовано) */
        .repaired-marker {
            filter: drop-shadow(0 0 5px #2ecc71);
        }
        
        @keyframes pulse-green {
            0% { stroke-width: 2; stroke-opacity: 0.8; }
            100% { stroke-width: 15; stroke-opacity: 0; }
        }
        .repaired-pulse {
            animation: pulse-green 1.5s infinite;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ROAD.SCAN</div>
        <div style="font-size: 0.7rem; color: #7f8c8d; font-weight: 600;">ДНІПРО // МОНІТОР</div>
    </header>

    <div id="map"></div>
    <div id="notification-container"></div>

    <div class="controls">
        <button class="btn-main" id="addBtn" onclick="toggleAddMode()">+ Повідомити про яму</button>
    </div>

    <!-- Modal для контактів -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <h3>Додати контакти (за бажанням)</h3>
            <input type="tel" id="contactPhone" placeholder="Номер телефону">
            <textarea id="contactComment" rows="3" placeholder="Коментар"></textarea>
            <button id="saveContactBtn">Зберегти</button>
            <button id="closeContactBtn" style="background:#ccc; color:#333;">Закрити</button>
        </div>
    </div>

    <!-- Модальне вікно порівняння до/після -->
    <div id="compareModal" class="compare-modal">
        <span class="close-compare" onclick="closeCompareModal()">&times;</span>
        <div class="compare-container">
            <div class="compare-box">
                <h3>📸 ДО РЕМОНТУ</h3>
                <img id="beforeImage" src="" alt="До ремонту">
            </div>
            <div class="compare-box">
                <h3>✅ ПІСЛЯ РЕМОНТУ</h3>
                <img id="afterImage" src="" alt="Після ремонту">
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6eAjnQsDrho7wAoKXgjSXVjHi_bjFiog",
            authDomain: "pits-de6be.firebaseapp.com",
            projectId: "pits-de6be",
            storageBucket: "pits-de6be.firebasestorage.app",
            messagingSenderId: "640813563870",
            appId: "1:640813563870:web:c789ef99a9359491e2274f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map', { zoomControl: false }).setView([48.4647, 35.0462], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let tempContactData = { phone: '', comment: '' };
        let pendingLatLng = null;
        let pendingPhotoFile = null;
        let currentPopup = null;

        map.locate({setView: true, maxZoom: 16});
        map.on('locationfound', (e) => {
            L.circleMarker(e.latlng, { radius: 8, fillColor: "#0088ff", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map).bindPopup("Ви тут");
            L.circle(e.latlng, e.accuracy / 2, { color: "#0088ff", fillColor: "#0088ff", fillOpacity: 0.1, weight: 1 }).addTo(map);
        });
        map.on('locationerror', (e) => showToast("Геолокація недоступна"));

        window.showToast = (msg) => {
            const container = document.getElementById('notification-container');
            const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg;
            container.appendChild(t); setTimeout(() => t.remove(), 3000);
        };

        window.toggleAddMode = () => {
            const isAdd = document.body.classList.toggle('adding-mode');
            const btn = document.getElementById('addBtn');
            btn.innerText = isAdd ? "Скасувати" : "+ Повідомити про яму";
            btn.style.background = isAdd ? "#e74c3c" : "#ff3232";
            if(isAdd) showToast("Оберіть місце ями на карті");
        };

        window.closeCompareModal = () => {
            document.getElementById('compareModal').style.display = 'none';
        };

        const processImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const MAX = 800;
                        if (width > MAX) { height *= MAX / width; width = MAX; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        };

        window.handlePhotoSelect = (input, btnId) => {
            if (input.files && input.files[0]) {
                const btn = document.getElementById(btnId);
                btn.innerText = "✅ Фото додано";
                btn.classList.add('photo-success');
                if (navigator.vibrate) navigator.vibrate(50);
                pendingPhotoFile = input.files[0];
            }
        };
        
        window.showContactModal = () => {
            document.getElementById('contactPhone').value = tempContactData.phone;
            document.getElementById('contactComment').value = tempContactData.comment;
            document.getElementById('contactModal').style.display = 'flex';
        };
        
        window.saveContactsOnly = () => {
            const phone = document.getElementById('contactPhone').value;
            const comment = document.getElementById('contactComment').value;
            tempContactData = { phone, comment };
            document.getElementById('contactModal').style.display = 'none';
            showToast("Контактні дані збережено");
        };
        
        window.createPit = async () => {
            if (!pendingLatLng) return;
            
            const file = pendingPhotoFile;
            let photoData = "https://via.placeholder.com/300x150?text=Немає+фото";

            try {
                if (file) {
                    showToast("Оптимізація фото...");
                    photoData = await processImage(file);
                }

                const docData = {
                    lat: pendingLatLng.lat,
                    lng: pendingLatLng.lng,
                    photo: photoData,
                    votes: 1,
                    createdAt: serverTimestamp()
                };
                
                if (tempContactData.phone.trim()) docData.contactPhone = tempContactData.phone.trim();
                if (tempContactData.comment.trim()) docData.contactComment = tempContactData.comment.trim();

                const docRef = await addDoc(collection(db, "potholes"), docData);
                localStorage.setItem(`voted_${docRef.id}`, "true");
                showToast("Яму успішно занесено в базу!");
                
                if (currentPopup) map.closePopup();
                
                pendingLatLng = null;
                pendingPhotoFile = null;
                tempContactData = { phone: '', comment: '' };
                
                const fileInput = document.getElementById('fileInp');
                if(fileInput) fileInput.value = '';
                
            } catch (err) {
                console.error(err);
                showToast("Помилка запису!");
            }
        };

        map.on('click', async (e) => {
            if (!document.body.classList.contains('adding-mode')) return;
            
            pendingLatLng = e.latlng;
            pendingPhotoFile = null;
            
            const popupCont = `
                <div class="pit-card">
                    <h4>НОВА ЯМА</h4>
                    <input type="file" id="fileInp" accept="image/*" style="display:none" onchange="handlePhotoSelect(this, 'photoBtnNew')">
                    <button class="vote-btn" id="photoBtnNew" onclick="document.getElementById('fileInp').click()">📷 Додати фото (опційно)</button>
                    <button class="vote-btn" style="background:#2ecc71; border-color:#2ecc71; color:white;" onclick="showContactModal()">📞 Додати контакти (за бажанням)</button>
                    <button class="vote-btn" style="background:#ff3232; color:white; border-color:#ff3232;" onclick="createPit()">✅ Створити мітку</button>
                </div>
            `;
            currentPopup = L.popup().setLatLng(e.latlng).setContent(popupCont).openOn(map);
            toggleAddMode();
        });

        window.voteForPit = async (id) => {
            const fileInp = document.getElementById(`updatePhoto_${id}`);
            const file = fileInp.files[0];
            
            if (localStorage.getItem(`voted_${id}`)) {
                return showToast("Ви вже підтримали цю мітку");
            }

            try {
                showToast("Опрацювання...");
                const docRef = doc(db, "potholes", id);
                let updateData = { votes: increment(1) };
                if (file) {
                    showToast("Оновлення фото...");
                    updateData.photo = await processImage(file);
                }
                await updateDoc(docRef, updateData);
                localStorage.setItem(`voted_${id}`, "true");
                showToast(file ? "Фото оновлено!" : "Голос враховано!");
            } catch (err) {
                showToast("Помилка Firestore");
            }
        };

        const activeMarkers = {};

        onSnapshot(collection(db, "potholes"), (snap) => {
            snap.docChanges().forEach(change => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added" || change.type === "modified") {
                    if (activeMarkers[id]) map.removeLayer(activeMarkers[id]);

                    const isCrit = data.votes >= 15;
                    const isRepaired = data.repaired === true && data.afterPhoto;
                    
                    // Вибір кольору маркера: зелений якщо відремонтовано, інакше червоний
                    const markerColor = isRepaired ? '#2ecc71' : '#ff3232';
                    const markerFill = isRepaired ? 'rgba(46, 204, 113, 0.6)' : 'rgba(255, 50, 50, 0.6)';
                    const markerBorder = isRepaired ? 'rgba(46, 204, 113, 0.8)' : 'rgba(255, 100, 100, 0.8)';
                    
                    const marker = L.circleMarker([data.lat, data.lng], {
                        radius: 7 + (data.votes / 2),
                        fillColor: markerFill,
                        color: markerBorder,
                        weight: 2, 
                        fillOpacity: 1,
                        className: isRepaired ? 'repaired-marker' : ''
                    }).addTo(map);

                    // Оновлений попап: якщо є фото "після", показуємо кнопку порівняння
                    const hasAfter = data.afterPhoto && data.repaired;
                    
                    const popupContent = hasAfter ? `
                        <div class="pit-card">
                            <img src="${data.photo}">
                            <h4 style="color:${isRepaired ? '#2ecc71' : '#ff3232'}">${isRepaired ? '✅ ВІДРЕМОНТОВАНО' : (isCrit ? 'КРИТИЧНА ЯМА' : 'ПОШКОДЖЕННЯ')}</h4>
                            <p>Підтверджень: ${data.votes}</p>
                            <button class="vote-btn" style="background:#0088ff; color:white; border-color:#0088ff;" onclick="window.parent.openCompareModal('${data.photo}', '${data.afterPhoto}')">🖼️ Дивитись До/Після</button>
                        </div>
                    ` : `
                        <div class="pit-card">
                            <img src="${data.photo}">
                            <h4 style="color:#ff3232">${isCrit ? 'КРИТИЧНА ЯМА' : 'ПОШКОДЖЕННЯ'}</h4>
                            <p>Підтверджень: ${data.votes}</p>
                            <input type="file" id="updatePhoto_${id}" accept="image/*" style="display:none" onchange="handlePhotoSelect(this, 'photoBtn_${id}')">
                            <button class="vote-btn" id="photoBtn_${id}" onclick="document.getElementById('updatePhoto_${id}').click()">📷 Змінити фото</button>
                            <button class="vote-btn" style="background:#ff3232; color:white; border-color:#ff3232;" onclick="voteForPit('${id}')">ПІДТВЕРДИТИ</button>
                        </div>
                    `;
                    
                    marker.bindPopup(popupContent);
                    activeMarkers[id] = marker;
                }
            });
        });
        
        // Глобальна функція для відкриття порівняння
        window.openCompareModal = (beforeUrl, afterUrl) => {
            const modal = document.getElementById('compareModal');
            const beforeImg = document.getElementById('beforeImage');
            const afterImg = document.getElementById('afterImage');
            beforeImg.src = beforeUrl;
            afterImg.src = afterUrl;
            modal.style.display = 'flex';
        };
        
        document.getElementById('saveContactBtn').onclick = saveContactsOnly;
        document.getElementById('closeContactBtn').onclick = () => {
            document.getElementById('contactModal').style.display = 'none';
        };
        window.onclick = function(event) {
            const modal = document.getElementById('contactModal');
            if (event.target === modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
