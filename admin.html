<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель модератора | Road.Scan</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #0088ff;
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { 
            font-family: 'Exo 2', sans-serif; 
            background: var(--bg); 
            color: white; 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        h1 { 
            font-family: 'Orbitron', sans-serif; 
            color: var(--accent); 
            text-align: center; 
            margin: 40px 0;
            letter-spacing: 2px;
        }

        /* Екран логіну */
        #login-screen { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; 
        }
        .login-box {
            background: var(--card-bg); backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* Таблиця та адаптивність */
        #admin-content { display: none; }
        
        .admin-table { 
            width: 100%; border-collapse: separate; border-spacing: 0 10px; 
        }
        
        .admin-table th { 
            padding: 15px; text-align: left; color: #64748b; font-size: 0.8rem; text-transform: uppercase; 
        }

        .admin-table tr { 
            background: var(--card-bg); transition: 0.3s; 
        }
        
        .admin-table tr:hover { transform: scale(1.01); background: rgba(255,255,255,0.08); }

        .admin-table td { padding: 15px; vertical-align: middle; }
        .admin-table td:first-child { border-radius: 12px 0 0 12px; }
        .admin-table td:last-child { border-radius: 0 12px 12px 0; }

        .img-preview { width: 100px; height: 60px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        
        .btn-map { 
            background: #2ecc71; color: white; border: none; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 0.75rem;
            display: inline-flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-map:hover { background: #27ae60; }

        .btn-delete { 
            background: #ff004c; color: white; border: none; padding: 8px 15px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; 
        }

        .date-text { color: #94a3b8; font-size: 0.85rem; }

        /* Мобільна версія */
        @media (max-width: 768px) {
            .admin-table thead { display: none; }
            .admin-table tr { 
                display: flex; flex-direction: column; margin-bottom: 20px; 
                padding: 15px; border-radius: 15px; 
            }
            .admin-table td { 
                display: flex; justify-content: space-between; align-items: center; 
                padding: 8px 0; border: none; 
            }
            .admin-table td::before { content: attr(data-label); color: #64748b; font-size: 0.8rem; }
            .img-preview { width: 100%; height: 150px; }
        }

        .btn-google {
            background: white; color: black; border: none; padding: 12px 25px;
            border-radius: 10px; cursor: pointer; font-weight: 700; display: flex; align-items: center; gap: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <div class="login-box">
                <h2 style="font-family: 'Orbitron'; margin-bottom: 25px;">Road.Scan Admin</h2>
                <button class="btn-google" onclick="login()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="20">
                    Увійти модератором
                </button>
                <p id="error-msg" style="color: #ff004c; margin-top: 15px; display: none;"></p>
            </div>
        </div>

        <div id="admin-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <span id="user-email" style="color: var(--accent); font-size: 0.9rem;"></span>
                <a href="#" onclick="logout()" style="color: #64748b; font-size: 0.8rem;">Вийти</a>
            </div>
            <h1>Панель керування</h1>
            
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>Фото</th>
                        <th>Дата створення</th>
                        <th>Локація</th>
                        <th>Голоси</th>
                        <th>Дія</th>
                    </tr>
                </thead>
                <tbody id="pitList"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC6eAjnQsDrho7wAoKXgjSXVjHi_bjFiog",
            authDomain: "pits-de6be.firebaseapp.com",
            projectId: "pits-de6be",
            storageBucket: "pits-de6be.firebasestorage.app",
            messagingSenderId: "640813563870",
            appId: "1:640813563870:web:c789ef99a9359491e2274f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const allowedEmails = ["andrey2003kornev@gmail.com"]; // ДОДАЙ СВІЙ EMAIL ТУТ

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user && allowedEmails.includes(user.email)) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                document.getElementById('user-email').innerText = user.email;
                loadPits();
            } else if (user) {
                document.getElementById('error-msg').innerText = "Доступ заборонено!";
                document.getElementById('error-msg').style.display = 'block';
                signOut(auth);
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('admin-content').style.display = 'none';
            }
        });

        function loadPits() {
            // Сортуємо: нові ями зверху
            const q = query(collection(db, "potholes"), orderBy("createdAt", "desc"));
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById('pitList');
                list.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    // Форматування дати
                    const dateObj = d.createdAt?.toDate ? d.createdAt.toDate() : new Date();
                    const dateStr = dateObj.toLocaleDateString('uk-UA') + ' ' + dateObj.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
                    
                    list.innerHTML += `
                        <tr>
                            <td data-label="Фото"><img src="${d.photo}" class="img-preview"></td>
                            <td data-label="Дата" class="date-text">${dateStr}</td>
                            <td data-label="Локація">
                                <div style="font-size: 0.8rem; margin-bottom: 5px;">${d.lat.toFixed(4)}, ${d.lng.toFixed(4)}</div>
                                <a href="https://www.google.com/maps?q=${d.lat},${d.lng}" target="_blank" class="btn-map">📍 Карта</a>
                            </td>
                            <td data-label="Голоси" style="font-weight: 700; color: var(--accent);">${d.votes}</td>
                            <td data-label="Дія"><button class="btn-delete" onclick="deletePit('${s.id}')">Видалити</button></td>
                        </tr>
                    `;
                });
            });
        }

        window.deletePit = async (id) => {
            if(confirm('Видалити мітку назавжди?')) await deleteDoc(doc(db, "potholes", id));
        };
    </script>
</body>
</html>
